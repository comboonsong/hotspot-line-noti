name: Hotspot Notification

on:
  schedule:
    # เวลา cron เป็น UTC (ไทย UTC+7)
    # Shifting 5 mins past the hour to avoid GitHub congestion
    # 05:05 ICT = 22:05 UTC (วันก่อนหน้า)
    - cron: "5 22 * * *"
    # 06:05 ICT = 23:05 UTC (วันก่อนหน้า)
    - cron: "5 23 * * *"
    # 07:05 ICT = 00:05 UTC
    - cron: "5 0 * * *"
    # 13:05 ICT = 06:05 UTC
    - cron: "5 6 * * *"
    # 14:05 ICT = 07:05 UTC
    - cron: "5 7 * * *"
    # 15:05 ICT = 08:05 UTC
    - cron: "5 8 * * *"
  workflow_dispatch:
    inputs:
      message_mode:
        description: "Message format"
        required: false
        default: "satellite"
        type: choice
        options:
          - satellite
          - district
          - both

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set timezone
        run: echo "TZ=Asia/Bangkok" >> $GITHUB_ENV

      - name: Run notification
        run: python main.py --now
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
          MESSAGE_MODE: ${{ github.event.inputs.message_mode || 'satellite' }}
