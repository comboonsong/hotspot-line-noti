name: Hotspot Notification

on:
  schedule:
    # เวลา cron เป็น UTC (ไทย = UTC+7)
    - cron: "25 22 * * *"   # 05:25 ICT → window 0000–0525 (รอบเช้า คงที่)
    - cron: "00 4 * * *"    # 11:00 ICT → window LAST–1100
    - cron: "00 5 * * *"    # 12:00 ICT → window LAST–1200
    - cron: "00 6 * * *"    # 13:00 ICT → window LAST–1300
    - cron: "00 7 * * *"    # 14:00 ICT → window LAST–1400
    - cron: "00 8 * * *"    # 15:00 ICT → window LAST–1500
    - cron: "00 9 * * *"    # 16:00 ICT → window LAST–1600
    - cron: "00 10 * * *"   # 17:00 ICT → window LAST–1700
  workflow_dispatch:
    inputs:
      message_mode:
        description: "Message format"
        required: false
        default: "satellite"
        type: choice
        options:
          - satellite
          - district
          - both
      window_start:
        description: "Window start (HHMM e.g. 0000) — leave empty to use saved state"
        required: false
        default: ""
      window_end:
        description: "Window end (HHMM e.g. 0525) — leave empty to use current time"
        required: false
        default: ""

permissions:
  contents: write   # required to commit .hotspot_state

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set timezone
        run: echo "TZ=Asia/Bangkok" >> $GITHUB_ENV

      # ── Read saved state ────────────────────────────────────────────────
      - name: Read last hotspot time
        id: state
        run: |
          if [ -f .hotspot_state ]; then
            LAST=$(cat .hotspot_state | tr -d '[:space:]')
            echo "LAST_HOTSPOT_TIME=$LAST" >> $GITHUB_OUTPUT
            echo "ℹ️  Restored state: LAST_HOTSPOT_TIME=$LAST"
          else
            echo "LAST_HOTSPOT_TIME=" >> $GITHUB_OUTPUT
            echo "ℹ️  No state file found — starting from 0000"
          fi

      # ── Map cron → explicit time window ─────────────────────────────────
      - name: Set time window
        id: window
        run: |
          LAST="${{ steps.state.outputs.LAST_HOTSPOT_TIME }}"
          FALLBACK="0000"

          case "${{ github.event.schedule }}" in
            "25 22 * * *")
              # Run 1: always start from 00:00 (daily reset)
              WSTART="0000"; WEND="0525"
              ;;
            "00 4 * * *")
              WSTART="${LAST:-$FALLBACK}"; WEND="1100"
              ;;
            "00 5 * * *")
              WSTART="${LAST:-$FALLBACK}"; WEND="1200"
              ;;
            "00 6 * * *")
              WSTART="${LAST:-$FALLBACK}"; WEND="1300"
              ;;
            "00 7 * * *")
              WSTART="${LAST:-$FALLBACK}"; WEND="1400"
              ;;
            "00 8 * * *")
              WSTART="${LAST:-$FALLBACK}"; WEND="1500"
              ;;
            "00 9 * * *")
              WSTART="${LAST:-$FALLBACK}"; WEND="1600"
              ;;
            "00 10 * * *")
              WSTART="${LAST:-$FALLBACK}"; WEND="1700"
              ;;
            *)
              # Manual trigger via workflow_dispatch
              WSTART="${{ github.event.inputs.window_start }}"
              if [ -z "$WSTART" ]; then
                WSTART="${LAST:-$FALLBACK}"
              fi
              WEND="${{ github.event.inputs.window_end }}"
              ;;
          esac

          echo "WINDOW_START=$WSTART" >> $GITHUB_OUTPUT
          echo "WINDOW_END=$WEND"   >> $GITHUB_OUTPUT
          echo "✅ Window: $WSTART → $WEND"

      # ── Run the notification script ──────────────────────────────────────
      - name: Run notification
        id: notify
        run: python main.py --now
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          MESSAGE_MODE: ${{ github.event.inputs.message_mode || 'satellite' }}
          WINDOW_START: ${{ steps.window.outputs.WINDOW_START }}
          WINDOW_END: ${{ steps.window.outputs.WINDOW_END }}

      # ── Persist state and daily logs ─────────────────────────────────────
      - name: Save state and daily logs
        run: |
          NEW_TIME="${{ steps.notify.outputs.LATEST_HOTSPOT_TIME }}"
          if [ -n "$NEW_TIME" ]; then
            echo "$NEW_TIME" > .hotspot_state
          fi
          
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          git add .hotspot_state docs/daily_messages.json
          
          # Only commit if files actually changed
          if git diff --cached --quiet; then
            echo "ℹ️  State and logs unchanged — no commit needed."
          else
            git commit -m "chore: update hotspot state and daily logs [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
            echo "✅ State and logs saved."
          fi
